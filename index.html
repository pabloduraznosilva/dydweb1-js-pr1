<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 1 JS</title>
</head>
<body>
    <script>
        // Declaración de variables
        let nombre;
        let edad;

        //Recibir datos del usuario y asignarlos a las variables    
        nombre = prompt("¿Cuál es tu nombre?");
        edad = prompt("¿Cuántos años tienes?");

        //Mostrar datos en página web
        document.write("Hola " + nombre + ", tienes " + edad + " años.");
        
    </script>
</body>
</html>
